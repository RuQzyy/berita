<footer class="bg-[#2f3e4e] text-white mt-16">

  <div class="max-w-7xl mx-auto px-6 py-12 grid md:grid-cols-4 gap-10">

    <!-- LOGO -->
    <div>
      <div class="flex items-center gap-2 text-xl font-semibold mb-4">
        <span class="text-3xl">∞</span>
        Berita Kini
      </div>

      <p class="text-sm text-gray-300 mb-6">
        © 2023 Berita Kini. All Rights Reserved.
      </p>

      <p class="mb-3 font-semibold">Ikuti Kami</p>

      <div class="flex gap-3">

        <div class="bg-gray-300 hover:bg-white hover:scale-110 transition text-black w-10 h-10 flex items-center justify-center rounded cursor-pointer">
          <fa-icon [icon]="faYoutube"></fa-icon>
        </div>

        <div class="bg-gray-300 hover:bg-white hover:scale-110 transition text-black w-10 h-10 flex items-center justify-center rounded cursor-pointer">
          <fa-icon [icon]="faInstagram"></fa-icon>
        </div>

        <div class="bg-gray-300 hover:bg-white hover:scale-110 transition text-black w-10 h-10 flex items-center justify-center rounded cursor-pointer">
          <fa-icon [icon]="faFacebook"></fa-icon>
        </div>

      </div>
    </div>

    <!-- TELUSURI -->
    <div>
      <h3 class="font-semibold mb-4">Telusuri</h3>
      <ul class="space-y-2 text-sm text-gray-300">
        <li class="hover:text-white cursor-pointer">Beranda</li>
        <li class="hover:text-white cursor-pointer">Kesehatan</li>
        <li class="hover:text-white cursor-pointer">Otomotif</li>
        <li class="hover:text-white cursor-pointer">Politik</li>
        <li class="hover:text-white cursor-pointer">Olahraga</li>
        <li class="hover:text-white cursor-pointer">Nasional</li>
        <li class="hover:text-white cursor-pointer">Internasional</li>
      </ul>
    </div>

    <!-- BANTUAN -->
    <div>
      <h3 class="font-semibold mb-4">Bantuan</h3>
      <ul class="space-y-2 text-sm text-gray-300">
        <li class="hover:text-white cursor-pointer">Kontak Kami</li>
        <li class="hover:text-white cursor-pointer">Laporan Pembajakan</li>
        <li class="hover:text-white cursor-pointer">Kebijakan</li>
      </ul>
    </div>

    <!-- SUBSCRIBE -->
    <div>
      <h3 class="font-semibold mb-4">Berlangganan Berita Terbaru</h3>

      <div class="flex bg-white rounded overflow-hidden shadow">

        <input
          type="email"
          placeholder="Masukan email"
          class="px-3 py-2 text-black text-sm w-full outline-none"
        />

        <button class="bg-blue-500 px-4 flex items-center justify-center hover:bg-blue-600 transition">
          <fa-icon [icon]="faSend" class="text-white"></fa-icon>
        </button>

      </div>
    </div>

  </div>

</footer>
